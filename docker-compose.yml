# Alzahra Homes — Dokploy Deployment Compose
# Services are deployed as a Dokploy Compose project.
# Environment variables are injected via Dokploy UI or .env files.

version: "3.8"

services:
  # ── PostgreSQL 16 + PostGIS ────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alzahra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-alzahra}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alzahra} -d ${POSTGRES_DB:-alzahra}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alzahra-network

  # ── Redis (BullMQ + Cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - alzahra-network

  # ── MinIO (S3-compatible object storage) ───────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-56Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alzahra-network
    labels:
      - "dokploy.service=true"
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`${MINIO_DOMAIN:-minio.alzahra.local}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certResolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_DOMAIN:-console.minio.alzahra.local}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certResolver=letsencrypt"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # ── Auth Service (Hono) ────────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - alzahra-network
    labels:
      - "dokploy.service=true"
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`${AUTH_DOMAIN:-auth.alzahra.local}`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certResolver=letsencrypt"
      - "traefik.http.services.auth.loadbalancer.server.port=4001"
      # CORS middleware (optional — can also be handled in app)
      - "traefik.http.middlewares.auth-cors.headers.accessControlAllowOriginList=${CORS_ORIGIN_LIST:-*}"
      - "traefik.http.middlewares.auth-cors.headers.accessControlAllowMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.auth-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Requested-With"
      - "traefik.http.middlewares.auth-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.routers.auth.middlewares=auth-cors@docker"

  # ── API Service (Hono) ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - alzahra-network
    labels:
      - "dokploy.service=true"
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.alzahra.local}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certResolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=${CORS_ORIGIN_LIST:-*}"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Requested-With"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.routers.api.middlewares=api-cors@docker"

  # ── Guest Web (Astro static + nginx) ───────────────────────────────
  guest-web:
    build:
      context: .
      dockerfile: apps/guest-web/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: ${API_URL}
      AUTH_URL: ${AUTH_URL}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - api
      - auth
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - alzahra-network
    labels:
      - "dokploy.service=true"
      - "traefik.enable=true"
      - "traefik.http.routers.guest-web.rule=Host(`${GUEST_WEB_DOMAIN:-alzahra.local}`)"
      - "traefik.http.routers.guest-web.entrypoints=websecure"
      - "traefik.http.routers.guest-web.tls.certResolver=letsencrypt"
      - "traefik.http.services.guest-web.loadbalancer.server.port=80"

  # ── Admin Web (Next.js standalone) ─────────────────────────────────
  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      API_URL: ${API_URL}
      AUTH_URL: ${AUTH_URL}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - api
      - auth
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - alzahra-network
    labels:
      - "dokploy.service=true"
      - "traefik.enable=true"
      - "traefik.http.routers.admin-web.rule=Host(`${ADMIN_WEB_DOMAIN:-admin.alzahra.local}`)"
      - "traefik.http.routers.admin-web.entrypoints=websecure"
      - "traefik.http.routers.admin-web.tls.certResolver=letsencrypt"
      - "traefik.http.services.admin-web.loadbalancer.server.port=3000"

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  alzahra-network:
    driver: bridge
